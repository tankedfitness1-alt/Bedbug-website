<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book BEDBUG</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">BEDBUG</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="booking.html">Book</a>
    <a href="payment.html">Payment</a>
  </nav>
</header>

<section>
  <h1>Book Your Adventure</h1>

  <div class="grid">
    <div class="card">
      <img src="IMG_5713.png" alt="BEDBUG beach adventure">
      <h3>Start Your Road Trip</h3>
      <p>Pick your dates, pack your bags and create your own BEDBUG getaway.</p>
    </div>

    <div class="box">
      <h2>Hire Rates</h2>
      <p><strong>Monday – Thursday</strong><br>$550 per night</p>
      <p><strong>Friday – Sunday</strong><br>$795 per night</p>
      <p><strong>Pick Up:</strong> 1:00pm</p>
      <p><strong>Return:</strong> 10:30am</p>
    </div>
  </div>
</section>

<section>
  <div class="box">
    <h2>Booking Request</h2>

    <form action="payment.html">
      <label>Full Name</label>
      <input type="text" placeholder="Your full name">

      <label>Email</label>
      <input type="email" placeholder="Your email address">

      <label>Phone</label>
      <input type="text" placeholder="Your phone number">

      <label>Pick-up Date</label>
      <input type="date">

      <label>Return Date</label>
      <input type="date">

      <label>Destination / Trip Plans</label>
      <textarea rows="5" placeholder="Tell us where you want to take BEDBUG"></textarea>

      <button type="submit">Continue To Payment</button>
    </form>
  </div>
</section>

<footer>
  Adventure Starts Here
</footer>

</body>
</html>
